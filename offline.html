<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #f9fafb;
        color: #111827;
      }

      body {
        background-image: linear-gradient(120deg, #fff, #eef2ff);
      }

      .container {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .content {
        max-width: 360px;
      }

      .logo {
        margin-bottom: 24px;
      }

      .title {
        font-weight: 700;
        font-size: 20px;
        margin-bottom: 12px;
      }

      .text {
        font-size: 14px;
        line-height: 1.5;
        color: #4a5565;
      }
    </style>

    <style>
      .flex-block {
        display: flex;
        flex-direction: row;
        align-items: flex-end;
        justify-content: center;
        gap: 5px;
      }

      .icon-block {
        position: relative;
        width: 42px;
      }

      svg.icon-globe {
        height: 32px;
        width: 32px;
        color: #615fff;
      }

      svg.icon-arrow {
        width: 16px;
        height: 16px;
        position: absolute;
        color: #fe9a00;
        top: 20px;
        left: 25px;
      }

      .text-logo {
        font-size: 32px;
        font-weight: bold;
        background: linear-gradient(135deg, #6366f1 0%, #f59e0b 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="content">
        <div class="logo">
          <div class="flex-block">
            <div class="icon-block">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="icon-globe"
              >
                <circle cx="12" cy="12" r="10"></circle>
                <path
                  d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"
                ></path>
                <path d="M2 12h20"></path>
              </svg>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="icon-arrow"
              >
                <path
                  d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z"
                ></path>
              </svg>
            </div>
            <span class="text-logo">Clikterria</span>
          </div>
        </div>
        <div class="title">
          <strong>You’re Currently Offline</strong>
        </div>
        <div class="text">
          This app requires an active internet connection.<br />
          Once you’re back online, you’ll be able to continue normally.
        </div>
      </div>
    </div>
  </body>
</html>
