<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Carousel</title>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="w-full max-w-6xl">
    <div class="overflow-hidden">
      <div id="track" class="flex gap-6 transition-transform duration-700"></div>
    </div>
  </div>

  <script>
    const items = [
      { name: "Mountain", src: "https://images.unsplash.com/photo-1506744038136-46273834b3fb" },
      { name: "City", src: "https://images.unsplash.com/photo-1491553895911-0055eca6402d" },
      { name: "Forest", src: "https://images.unsplash.com/photo-1519681393784-d120267933ba" },
      { name: "Desert", src: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" },
      { name: "Ocean", src: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e" },
      { name: "River", src: "https://images.unsplash.com/photo-1501785888041-af3ef285b470" },
      { name: "Sunset", src: "https://images.unsplash.com/photo-1470770841072-f978cf4d019e" },
      { name: "Snow", src: "https://images.unsplash.com/photo-1482192596544-9eb780fc7f66" },
      { name: "Beach", src: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e" },
      { name: "Waterfall", src: "https://images.unsplash.com/photo-1502082553048-f009c37129b9" },
      { name: "Valley", src: "https://images.unsplash.com/photo-1500534314209-a25ddb2bd429" },
      { name: "Lake", src: "https://images.unsplash.com/photo-1501785888041-af3ef285b470" }
    ];

    const track = document.getElementById("track");

    items.forEach((item) => {
      const slide = document.createElement("div");
      slide.className = "w-1/2 md:w-1/3 lg:w-1/4 flex-shrink-0";
      slide.innerHTML = `
        <div class="flex flex-col gap-2">
          <p class="text-center font-semibold text-gray-700">${item.name}</p>
          <img src="${item.src}" class="w-full h-48 object-cover rounded-2xl shadow" />
        </div>
      `;
      track.appendChild(slide);
    });

    let index = 0;

    function getVisibleSlides() {
      const width = window.innerWidth;
      if (width >= 1024) return 4;
      if (width >= 768) return 3;
      return 2;
    }

    function getSlideWidth() {
      const slide = track.children[0];
      if (!slide) return 0;
      const styles = getComputedStyle(track);
      const gap = parseFloat(styles.columnGap || styles.gap || 0);
      return slide.offsetWidth + gap;
    }

    function autoScroll() {
      const visibleSlides = getVisibleSlides();
      const slideWidth = getSlideWidth();
      index = index >= items.length - visibleSlides ? 0 : index + 1;
      track.style.transform = `translateX(-${index * slideWidth}px)`;
    }

    window.addEventListener("resize", () => {
      const slideWidth = getSlideWidth();
      track.style.transform = `translateX(-${index * slideWidth}px)`;
    });

    setInterval(autoScroll, 2500);
  </script>
</body>
</html>
